name: Quality Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Design System & Build Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Design System Audit
        run: npm run lint:design-system:strict

      - name: Content Audit
        run: npm run lint:content -- --strict

      - name: Export Corpus
        run: npm run export:corpus

      - name: Type Check
        run: npm run check

      - name: Build Project
        run: npm run build
