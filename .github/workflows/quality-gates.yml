name: Quality Gates

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  quality:
    name: Design System & Build Quality
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Design System Audit
        run: npm run lint:design-system:strict

      - name: Content Audit
        run: npm run lint:content -- --strict

      - name: Type Check
        run: npm run check

      - name: Build Project
        run: npm run build

      - name: Start local Pages runtime for SSE verify
        if: env.OPENAI_API_KEY != ''
        run: |
          npx wrangler pages dev dist --compatibility-date=2024-01-01 --port 8788 > /tmp/wrangler-pages.log 2>&1 &
          echo $! > /tmp/wrangler-pages.pid
          sleep 10

      - name: Verify SSE contract
        if: env.OPENAI_API_KEY != ''
        run: ./scripts/verify-sse.sh http://localhost:8788

      - name: Stop local Pages runtime
        if: always() && env.OPENAI_API_KEY != ''
        run: |
          if [ -f /tmp/wrangler-pages.pid ]; then
            kill "$(cat /tmp/wrangler-pages.pid)" || true
          fi
